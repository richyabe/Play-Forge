<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Scores | PlayForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>.sidebar-logo{height:34px;width:auto;filter:drop-shadow(0 0 8px rgba(0,243,255,.5));}</style>
</head>
<body class="flex min-h-screen">
  <button id="sidebar-toggle" class="fixed top-4 left-4 z-50 md:hidden p-2.5 glass neon-border rounded-xl" style="z-index:80"><svg class="w-5 h-5" style="color:var(--neon-cyan)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
  <div id="sidebar-backdrop"></div>
  <aside id="sidebar" class="sidebar w-64 min-h-screen glass border-r border-gray-800 flex flex-col p-5 fixed md:relative" style="z-index:62">
    <div class="sidebar-glow"></div>
    <div class="relative z-10 flex flex-col h-full">
      <div class="flex items-center gap-2 mb-7 mt-8 md:mt-0"><img src="forge_play_logo.png" alt="PlayForge" class="sidebar-logo"></div>
      <nav class="space-y-1 flex-1">
        <a href="index.html"     class="nav-link">🏠 Home</a>
        <a href="games.html"    class="nav-link">🎮 All Games</a>
        <a href="scores.html"   class="nav-link active">🏆 High Scores</a>
        <a href="settings.html" class="nav-link">⚙️ Settings</a>
      </nav>
      <div class="text-xs pt-4 border-t border-gray-800" style="color:var(--text-dim)">v2.0 · 9 Games</div>
    </div>
  </aside>
  <main class="flex-1" style="padding:clamp(16px,3vw,40px);padding-top:clamp(60px,5vw,40px)">
    <h2 class="font-orbitron text-2xl md:text-3xl font-bold mb-8 neon-text animate-fade-in">High Scores</h2>
    <div class="glass rounded-2xl overflow-hidden max-w-2xl animate-fade-in">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead style="background:rgba(0,243,255,.06)">
            <tr>
              <th class="p-4 text-left font-orbitron text-xs tracking-widest" style="color:var(--text-dim)">GAME</th>
              <th class="p-4 text-left font-orbitron text-xs tracking-widest" style="color:var(--text-dim)">BEST</th>
              <th class="p-4 text-left font-orbitron text-xs tracking-widest" style="color:var(--text-dim)">PLAYS</th>
            </tr>
          </thead>
          <tbody>
            <tr class="border-t border-gray-800 hover:bg-white/5 transition"><td class="p-4">🏃 Neon Dash</td><td class="p-4 text-orange-400 font-semibold" id="hs-runner">0</td><td class="p-4" style="color:var(--text-dim)" id="plays-runner">0</td></tr>
            <tr class="border-t border-gray-800 hover:bg-white/5 transition"><td class="p-4">🚀 Asteroid Blaster</td><td class="p-4 font-semibold" style="color:var(--neon-cyan)" id="hs-asteroids">0</td><td class="p-4" style="color:var(--text-dim)" id="plays-asteroids">0</td></tr>
            <tr class="border-t border-gray-800 hover:bg-white/5 transition"><td class="p-4">🐍 Snake</td><td class="p-4 text-green-400 font-semibold" id="hs-snake">0</td><td class="p-4" style="color:var(--text-dim)" id="plays-snake">0</td></tr>
            <tr class="border-t border-gray-800 hover:bg-white/5 transition"><td class="p-4">❌ Tic Tac Toe</td><td class="p-4 text-purple-400 font-semibold" id="hs-ttt">0</td><td class="p-4" style="color:var(--text-dim)" id="plays-ttt">0</td></tr>
            <tr class="border-t border-gray-800 hover:bg-white/5 transition"><td class="p-4">🔢 2048</td><td class="p-4 text-yellow-400 font-semibold" id="hs-2048">0</td><td class="p-4" style="color:var(--text-dim)" id="plays-2048">0</td></tr>
            <tr class="border-t border-gray-800 hover:bg-white/5 transition"><td class="p-4">🃏 Memory Match</td><td class="p-4 text-blue-400 font-semibold" id="hs-memory">0</td><td class="p-4" style="color:var(--text-dim)" id="plays-memory">0</td></tr>
            <tr class="border-t border-gray-800 hover:bg-white/5 transition"><td class="p-4">🧱 Breakout</td><td class="p-4 text-red-400 font-semibold" id="hs-breakout">0</td><td class="p-4" style="color:var(--text-dim)" id="plays-breakout">0</td></tr>
            <tr class="border-t border-gray-800 hover:bg-white/5 transition"><td class="p-4">🏓 Pong</td><td class="p-4 text-teal-400 font-semibold" id="hs-pong">0</td><td class="p-4" style="color:var(--text-dim)" id="plays-pong">0</td></tr>
            <tr class="border-t border-gray-800 hover:bg-white/5 transition"><td class="p-4">🐦 Flappy Bird</td><td class="p-4 text-orange-400 font-semibold" id="hs-flappy">0</td><td class="p-4" style="color:var(--text-dim)" id="plays-flappy">0</td></tr>
          </tbody>
        </table>
      </div>
    </div>
    <p class="text-xs mt-4" style="color:var(--text-dim)">Scores stored locally in your browser.</p>
  </main>
  <div id="toast" class="hide"><div id="toast-msg"></div></div>
  <script src="js/app.js"></script>
  <script>document.addEventListener('DOMContentLoaded',()=>PlayForge.updateAllScores());</script>
</body>
</html>
