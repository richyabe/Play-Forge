<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scores | PlayForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="flex min-h-screen">
  <div id="sidebar-backdrop"></div>
  <button id="sidebar-toggle" class="fixed top-4 left-4 z-50 md:hidden p-2 glass neon-border rounded-lg">
    <svg class="w-6 h-6" style="color:var(--neon-cyan)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>
  <aside id="sidebar" class="sidebar w-64 min-h-screen glass border-r border-gray-800 flex flex-col p-6 space-y-2" style="border-radius:0">
    <div class="flex items-center gap-3 mb-6 mt-2 md:mt-0">
      <img src="forge play logo.png" alt="PlayForge" class="h-10 w-auto logo-glow">
      <!-- Optional: keep text too -->
       <!-- <h1 class="font-orbitron text-xl font-bold neon-text">PlayForge</h1> -->
    </div>
    <nav class="space-y-1 flex-1">
      <a href="index.html"    class="nav-link flex items-center gap-3 p-3 rounded-lg hover:bg-white/10 transition text-sm">🏠 Home</a>
      <a href="games.html"   class="nav-link flex items-center gap-3 p-3 rounded-lg hover:bg-white/10 transition text-sm">🎮 All Games</a>
      <a href="scores.html"  class="nav-link active flex items-center gap-3 p-3 rounded-lg hover:bg-white/10 transition text-sm">🏆 Global Scores</a>
      <a href="settings.html" class="nav-link flex items-center gap-3 p-3 rounded-lg hover:bg-white/10 transition text-sm">⚙️ Settings</a>
    </nav>
    <div class="text-xs text-gray-600 pt-4 border-t border-gray-800">v1.0 · 7 Games</div>
  </aside>
  <main class="flex-1 p-6 md:p-10">
    <h2 class="font-orbitron text-3xl font-bold mb-8 neon-text animate-fade-in">Global High Scores</h2>
    <div class="glass rounded-xl p-6 max-w-3xl overflow-x-auto animate-fade-in">
      <table class="w-full text-left text-sm">
        <thead>
          <tr class="border-b border-gray-700">
            <th class="p-3 font-orbitron text-xs tracking-widest text-gray-400">GAME</th>
            <th class="p-3 font-orbitron text-xs tracking-widest text-gray-400">BEST SCORE</th>
            <th class="p-3 font-orbitron text-xs tracking-widest text-gray-400">PLAYS</th>
          </tr>
        </thead>
        <tbody>
          <tr class="border-b border-gray-800 hover:bg-white/5 transition">
            <td class="p-3">🐍 Snake</td>
            <td class="p-3 text-green-400 font-semibold" id="hs-snake">0</td>
            <td class="p-3 text-gray-400" id="plays-snake">0</td>
          </tr>
          <tr class="border-b border-gray-800 hover:bg-white/5 transition">
            <td class="p-3">❌ Tic Tac Toe</td>
            <td class="p-3 text-purple-400 font-semibold" id="hs-ttt">0</td>
            <td class="p-3 text-gray-400" id="plays-ttt">0</td>
          </tr>
          <tr class="border-b border-gray-800 hover:bg-white/5 transition">
            <td class="p-3">🔢 2048</td>
            <td class="p-3 text-yellow-400 font-semibold" id="hs-2048">0</td>
            <td class="p-3 text-gray-400" id="plays-2048">0</td>
          </tr>
          <tr class="border-b border-gray-800 hover:bg-white/5 transition">
            <td class="p-3">🃏 Memory Match</td>
            <td class="p-3 text-blue-400 font-semibold" id="hs-memory">0</td>
            <td class="p-3 text-gray-400" id="plays-memory">0</td>
          </tr>
          <tr class="border-b border-gray-800 hover:bg-white/5 transition">
            <td class="p-3">🧱 Breakout</td>
            <td class="p-3 text-red-400 font-semibold" id="hs-breakout">0</td>
            <td class="p-3 text-gray-400" id="plays-breakout">0</td>
          </tr>
          <tr class="border-b border-gray-800 hover:bg-white/5 transition">
            <td class="p-3">🏓 Pong</td>
            <td class="p-3 text-teal-400 font-semibold" id="hs-pong">0</td>
            <td class="p-3 text-gray-400" id="plays-pong">0</td>
          </tr>
          <tr class="hover:bg-white/5 transition">
            <td class="p-3">🐦 Flappy Bird</td>
            <td class="p-3 text-orange-400 font-semibold" id="hs-flappy">0</td>
            <td class="p-3 text-gray-400" id="plays-flappy">0</td>
          </tr>
        </tbody>
      </table>
    </div>
    <p class="text-xs text-gray-600 mt-4">Scores are stored locally in your browser.</p>
  </main>
  <div id="toast" class="hide"><div id="toast-msg" class="font-semibold text-sm"></div></div>
  <script src="js/app.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => PlayForge.updateAllScores());</script>
</body>
</html>
