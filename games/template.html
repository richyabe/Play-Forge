<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00f3ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/forge play logo.png">
<main class="flex-1 p-4 md:p-8 flex flex-col items-center justify-center min-h-[calc(100vh-4rem)]">
  <div class="w-full max-w-xl fade-in">
    <div class="flex items-center justify-between mb-4">
      <h1 class="font-orbitron text-2xl md:text-3xl font-bold neon-text">Game Name</h1>
      <div class="flex gap-4 text-sm font-mono">
        <span>Score: <b id="game-score" class="text-[#00f3ff]">0</b></span>
        <span>Best: <b id="game-hs">0</b></span>
      </div>
    </div>

    <div class="relative game-container w-full mb-4">
      <!-- Change canvas ID for non-canvas games if needed -->
      <canvas id="game-canvas" width="400" height="400" class="game-canvas rounded-xl bg-black"></canvas>
      <div id="ttt-board" class="grid grid-cols-3 gap-2 w-64 h-64 mx-auto hide"></div>
      <div id="grid-2048" class="hide"></div>
      <div id="mem-grid" class="hide"></div>
      
      <div id="pause-overlay" class="pause-overlay hidden">
        <h2 class="font-orbitron text-3xl mb-4 neon-text">PAUSED</h2>
        <p class="text-gray-400 mb-6 text-sm">Press ESC or click Resume</p>
        <button onclick="window.currentGame?.resume()" class="btn-primary px-6 py-2">Resume</button>
      </div>
    </div>

    <div class="flex justify-between items-center">
      <div class="flex gap-2">
        <button onclick="window.currentGame?.restart()" class="btn-ghost">🔄 Restart</button>
        <button onclick="window.currentGame?.pause()" class="btn-ghost">⏸ Pause</button>
      </div>
      <a href="../games.html" class="btn-ghost flex items-center gap-1">🔙 Library</a>
    </div>
    <p class="text-xs text-gray-500 mt-4 text-center">Controls: Arrow Keys / WASD / Mouse / Touch</p>
  </div>
</main>

<!-- For canvas games, keep: <canvas id="game-canvas" ...> -->
<!-- For TTT: show <div id="ttt-board"> and hide canvas -->
<!-- For 2048: show <div id="grid-2048"> and hide canvas -->
<!-- For Memory: show <div id="mem-grid"> and hide canvas -->
