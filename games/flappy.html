<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00f3ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/forge play logo.png">
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird | PlayForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="flex min-h-screen">
  <div id="sidebar-backdrop"></div>
  <button id="sidebar-toggle" class="fixed top-4 left-4 z-50 md:hidden p-2 glass neon-border rounded-lg">
    <svg class="w-6 h-6" style="color:var(--neon-cyan)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>
  <aside id="sidebar" class="sidebar w-64 min-h-screen glass border-r border-gray-800 flex flex-col p-6 space-y-2" style="border-radius:0">
    <div class="flex items-center gap-3 mb-6">
      <div class="w-10 h-10 rounded-lg flex items-center justify-center font-bold text-white text-sm" style="background:linear-gradient(135deg,var(--neon-cyan),var(--neon-purple))">PF</div>
      <h1 class="font-orbitron text-xl font-bold neon-text">PlayForge</h1>
    </div>
    <nav class="space-y-1 flex-1">
      <a href="../index.html"    class="nav-link flex items-center gap-3 p-3 rounded-lg hover:bg-white/10 transition text-sm">🏠 Home</a>
      <a href="../games.html"   class="nav-link active flex items-center gap-3 p-3 rounded-lg hover:bg-white/10 transition text-sm">🎮 All Games</a>
      <a href="../scores.html"  class="nav-link flex items-center gap-3 p-3 rounded-lg hover:bg-white/10 transition text-sm">🏆 Global Scores</a>
      <a href="../settings.html" class="nav-link flex items-center gap-3 p-3 rounded-lg hover:bg-white/10 transition text-sm">⚙️ Settings</a>
    </nav>
  </aside>
  <main class="flex-1 p-4 md:p-6 flex flex-col items-center justify-center">
    <div class="w-full max-w-sm animate-fade-in">
      <div class="flex items-center justify-between mb-4">
        <h1 class="font-orbitron text-2xl font-bold text-orange-400">Flappy Bird</h1>
        <div class="flex gap-4 text-sm font-mono">
          <span>Score: <b id="game-score" style="color:var(--neon-cyan)">0</b></span>
          <span class="text-gray-400">Best: <b id="game-hs">0</b></span>
        </div>
      </div>
      <div class="game-container w-full mx-auto mb-4" style="aspect-ratio:3/4;max-width:300px">
        <canvas id="game-canvas" width="300" height="400" class="game-canvas rounded-xl"></canvas>
        <div id="pause-overlay" class="pause-overlay hidden">
          <h2 class="font-orbitron text-3xl mb-2 neon-text">PAUSED</h2>
          <button onclick="window.currentGame.resume()" class="btn-primary px-6 py-2">Resume</button>
        </div>
      </div>
      <div class="flex justify-between max-w-xs mx-auto">
        <button onclick="window.currentGame.restart()" class="btn-ghost">🔄 Restart</button>
        <button onclick="window.currentGame.pause()"   class="btn-ghost">⏸ Pause</button>
        <a href="../games.html" class="btn-ghost">🔙 Back</a>
      </div>
      <p class="text-xs text-gray-500 mt-4 text-center">Tap / Click / Space to flap</p>
    </div>
  </main>
  <div id="toast" class="hide"><div id="toast-msg" class="font-semibold text-sm"></div></div>
  <script src="../js/app.js"></script>
  <script src="flappy.js"></script>
</body>
</html>
