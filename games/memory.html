<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Match | PlayForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="flex min-h-screen">
  <div id="sidebar-backdrop"></div>
  <button id="sidebar-toggle" class="fixed top-4 left-4 z-50 md:hidden p-2 glass neon-border rounded-lg">
    <svg class="w-6 h-6" style="color:var(--neon-cyan)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>
  <aside id="sidebar" class="sidebar w-64 min-h-screen glass border-r border-gray-800 flex flex-col p-6 space-y-2" style="border-radius:0">
    <div class="flex items-center gap-3 mb-6">
      <div class="w-10 h-10 rounded-lg flex items-center justify-center font-bold text-white text-sm" style="background:linear-gradient(135deg,var(--neon-cyan),var(--neon-purple))">PF</div>
      <h1 class="font-orbitron text-xl font-bold neon-text">PlayForge</h1>
    </div>
    <nav class="space-y-1 flex-1">
      <a href="../index.html"    class="nav-link flex items-center gap-3 p-3 rounded-lg hover:bg-white/10 transition text-sm">🏠 Home</a>
      <a href="../games.html"   class="nav-link active flex items-center gap-3 p-3 rounded-lg hover:bg-white/10 transition text-sm">🎮 All Games</a>
      <a href="../scores.html"  class="nav-link flex items-center gap-3 p-3 rounded-lg hover:bg-white/10 transition text-sm">🏆 Global Scores</a>
      <a href="../settings.html" class="nav-link flex items-center gap-3 p-3 rounded-lg hover:bg-white/10 transition text-sm">⚙️ Settings</a>
    </nav>
  </aside>
  <main class="flex-1 p-6 md:p-10 flex items-center justify-center">
    <div class="w-full max-w-sm animate-fade-in text-center">
      <h1 class="font-orbitron text-3xl font-bold mb-4 text-blue-400">Memory Match</h1>
      <div class="flex justify-between mb-4 text-sm font-mono px-1">
        <span>Moves: <b id="game-score" style="color:var(--neon-cyan)">0</b></span>
        <span class="text-gray-400">Best: <b id="game-hs">0</b> moves</span>
      </div>
      <!-- Board: 4×4 grid, ID = mem-board to match JS -->
      <div id="mem-board" class="grid grid-cols-4 gap-2 max-w-xs mx-auto mb-6"></div>
      <div class="flex justify-center gap-4">
        <button onclick="window.currentGame.restart()" class="btn-primary px-6 py-2">Restart</button>
        <a href="../games.html" class="btn-ghost">Back</a>
      </div>
    </div>
  </main>
  <div id="toast" class="hide"><div id="toast-msg" class="font-semibold text-sm"></div></div>
  <script src="../js/app.js"></script>
  <script src="memory.js"></script>
</body>
</html>
